{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
.page-body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: rgb(112, 108, 108);
}
.form-container {
    position: relative;
    width: 100%;
    max-width: 500px;
    padding: 50px 35px;
    border-radius: 10px;
    backdrop-filter: blur(5px);
    box-shadow: 0 0 40px rgba(8, 7, 16, 0.6);
    border: 2px solid rgba(255, 255, 255, 0.1);
    background-color: rgba(255, 255, 255, 0.13);
}

/* Form input and label styles */
.input-group {
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    font-size: 16px;
    font-weight: 500;
    color: #000; /* Black label color */
}

.input-group input {
    width: 100%;
    height: 50px;
    padding: 0 10px;
    font-size: 14px;
    font-weight: 300;
    border-radius: 3px;
    border: none;
    outline: none;
    background-color: rgba(255, 255, 255, 0.07);
    color: #000; /* Black input text color */
    letter-spacing: 0.5px;
}

.input-group input::placeholder {
    color: #000; /* Black placeholder color */
}

.submitForm {
    width: 100%;
    z-index: 1;
    margin-top: 30px;
    color: #080710;
    padding: 15px 0;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    overflow: hidden;
    border-radius: 5px;
    position: relative;
    background: skyblue;
}
.submitForm::before {
    content: "";
    top: 0%;
    left: -100%;
    z-index: -1;
    width: 100%;
    height: 100%;
    color: #fff;
    border-radius: 5px;
    position: absolute;
    transition: left 0.4s, color 0.4s;
    background-color: #202020;
}
.submitForm:hover {
    color: #fff;
}
.submitForm:hover::before {
    left: 0%;
}
/* Radio group styles */
.radio-group {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
}

.radio-group label {
    display: flex;
    align-items: center;
    font-size: 14px;
    font-weight: 500;
    color: #000; /* Black label color */
}

.radio-group input {
    margin-right: 5px;
}

/* Styles for messages */
form p {
    color: #ff0000;
    font-size: 14px;
    margin-bottom: 15px;
}
</style>
<div class="page-body">
    <div class="form-container">
        <form action="{% url 'register' %}" method='post'>
            {% if messages %}
                {% for message in messages %}
                    <p>{{message}}</p>
                {% endfor %}
            {% endif %}
            {% csrf_token %}
            <div class="input-group">
                <label for="name">Name</label>
                <input type="text" placeholder="Enter Name" id="name" name='name' required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" placeholder="Enter Email" id="email" name='Email' required>
            </div>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" placeholder="Enter Username" id="username" name='username' required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" placeholder="Enter Password" id="password" name='password' required>
            </div>
            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" placeholder="Confirm Password" id="confirm-password" name='confirm_password' required>
            </div>
            <div class="radio-group">
                <label for="admin">
                    <input type="radio" id="admin" name="select_user" value="admin"> Admin
                    <input type="radio" id="student" name="select_user" value="student"> Student
                </label>
            </div>
            <button class="submitForm">Register</button>
        </form>
    </div>
</div>
{% endblock %}
