{% extends "base.html" %}
{% load static %}
{% block content %}
<style>
.page-body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: rgb(112, 108, 108);
}

.form-container {
    position: relative;
    width: 100%;
    max-width: 500px;
    padding: 50px 35px;
    border-radius: 10px;
    backdrop-filter: blur(5px);
    box-shadow: 0 0 40px rgba(8, 7, 16, 0.6);
    border: 2px solid rgba(255, 255, 255, 0.1);
    background-color: rgba(255, 255, 255, 0.13);
}

/* Form input and label styles */
.input-group {
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    font-size: 16px;
    font-weight: 500;
    color: #000; /* Black label color */
}

.input-group input,
.input-group textarea {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    font-weight: 300;
    border-radius: 3px;
    border: none;
    outline: none;
    background-color: rgba(255, 255, 255, 0.07);
    color: #000; /* Black input text color */
    letter-spacing: 0.5px;
}

.input-group input::placeholder,
.input-group textarea::placeholder {
    color: #000; /* Black placeholder color */
}

.input-group input[type="file"] {
    padding: 5px;
}

.submitForm {
    width: 100%;
    margin-top: 30px;
    padding: 15px 0;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 5px;
    color: #080710;
    background: skyblue;
    position: relative;
    overflow: hidden;
    transition: color 0.4s;
}

.submitForm::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    border-radius: 5px;
    background-color: #202020;
    transition: left 0.4s;
}

.submitForm:hover {
    color: #fff;
}

.submitForm:hover::before {
    left: 0;
}
</style>

<div class="page-body">
    <div class="form-container">
        <form action="{% url 'add_book' %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="input-group">
                <label for="title">Title</label>
                <input id="title" name="title" type="text" placeholder="Enter book title" required>
            </div>
            
            <div class="input-group">
                <label for="author_name">Author Name</label>
                <textarea id="author_name" name="author_name" placeholder="Enter author name" required></textarea>
            </div>
            
            <div class="input-group">
                <label for="price">Price</label>
                <input type="number" id="price" name="price" step="0.01" placeholder="Enter book price" required>
            </div>
            
            <div class="input-group">
                <label for="image">Book Image</label>
                <input type="file" id="image" name="image" required>
            </div>
            
            <div class="input-group">
                <label for="pdf">Book PDF</label>
                <input type="file" id="pdf" name="pdf" required>
            </div>
            
            <button class="submitForm" type="submit">Add Book</button>
        </form>
    </div>
</div>
{% endblock %}
