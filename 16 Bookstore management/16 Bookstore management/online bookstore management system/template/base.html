{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <title>{% block title %}Homepage{% endblock %}</title>
    <style>
        .intro img {
            height: 70vh;
            width: 1000px;
        }
        body, h1, p {
            margin: 0;
            padding: 0;
        }
        header {
            background-color: skyblue;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .logo {
            font-size: 25px;
            font-family: 'Sriracha', cursive;
            color: #000;
            text-decoration: none;
        }
        .navbar {
            text-align: center;
        }
        nav a {
            text-decoration: none;
            color: black;
            font-size: 17px;
            font-weight: bolder;
        }
        button {
            border: transparent;
            background-color: transparent;
        }
        button:hover {
            color: white;
        }
        .intro {
            text-align: center;
            padding: 30px;
        }
        h1 {
            font-size: 56px;
            color: black;
        }
        main {
            min-height: 100vh;
            background-repeat: no-repeat;
            background-size: 100rem;
            background-position: center;
            width: auto;
            margin-top: 70px; /* Ensure content is not hidden behind the fixed header */
        }
        nav button{
            padding-right:30px;
        }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo" style="margin-left:80px">Online Bookstore</a>
        <div>
            <nav class="navbar" style="margin-right:40px">
                <button>
                    <a href="{% url 'home' %}">Home</a>
                </button>
                {% if user.is_authenticated %}
                {% if user.is_staff %}
                <button>
                    <a href="{% url 'add_book' %}">add book</a>
                </button>
                <button>
                    <a href="{% url 'books' %}">Books</a>
                </button>
                <button>
                    <a href="{% url 'logout' %}">Logout</a>
                </button>
                {% else %}
                <button>
                    <a href="{% url 'books' %}">Books</a>
                </button>
                <button>
                    <a href="{% url 'cart' %}">Buylist</a>
                </button>
                <button>
                    <a href="{% url 'logout' %}">Logout</a>
                </button>
                {% endif %}
                {% else %}
                <button>
                    <a href="{% url 'login' %}">Login</a>
                </button>
                <button>
                    <a href="{% url 'register' %}">Register</a>
                </button>
                {% endif %}
            </nav>
        </div>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
